name: Android CI Build

# 1. When do we run this? Every time you push code to GitHub!
on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    # 2. What kind of computer should the cloud use?
    runs-on: ubuntu-latest

    steps:
    # 3. Download your code onto the cloud computer
    - name: Checkout Code
      uses: actions/checkout@v4

    # 4. Install Java so Android can compile
    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    # 5. Fix Windows permissions (makes sure the cloud can run Gradle)
    - name: Make gradlew executable
      run: chmod +x ./gradlew

    # 6. The magic command! (Exactly what you typed earlier)
    - name: Build APK
      run: ./gradlew assembleDebug

    # 7. Upload the finished APK so you can download it
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk